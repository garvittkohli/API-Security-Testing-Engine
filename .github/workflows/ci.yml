name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run unit tests
        run: |
          pytest --cov=apisec --cov-report=term-missing

      - name: Run demo scan (smoke test)
        run: |
          apisec demo --html reports/demo_report.html --json reports/demo_report.json

      - name: Verify demo report artifacts exist
        run: |
          test -f reports/demo_report.html
          test -f reports/demo_report.json

      - name: Upload demo reports
        uses: actions/upload-artifact@v4
        with:
          name: demo-reports-py${{ matrix.python-version }}
          path: reports/

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: ruff check apisec tests
